version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ovi_dev
      POSTGRES_USER: ovi_user
      POSTGRES_PASSWORD: ovi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovi_user -d ovi_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ovi_user:ovi_password@postgres:5432/ovi_dev
      - ENVIRONMENT=development
      - DEBUG=true
      - SECRET_KEY=dev-secret-key-change-in-production
      - CORS_ORIGINS=http://localhost:3000,http://localhost:19006
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_BACKEND=redis
      - RATE_LIMIT_REDIS_URL=redis://redis:6379/0
      - OBJECT_STORAGE_BACKEND=local
      - OBJECT_STORAGE_LOCAL_DIR=/app/media/photo_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/venv
      - photo_uploads:/app/media/photo_uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["arq", "app.workers.photo_worker.WorkerSettings"]
    environment:
      - DATABASE_URL=postgresql://ovi_user:ovi_password@postgres:5432/ovi_dev
      - ENVIRONMENT=development
      - DEBUG=true
      - SECRET_KEY=dev-secret-key-change-in-production
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_BACKEND=redis
      - RATE_LIMIT_REDIS_URL=redis://redis:6379/0
      - OBJECT_STORAGE_BACKEND=local
      - OBJECT_STORAGE_LOCAL_DIR=/app/media/photo_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/venv
      - photo_uploads:/app/media/photo_uploads
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  photo_uploads:
