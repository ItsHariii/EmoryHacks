name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy
        run: mypy app

  test:
    runs-on: ubuntu-latest
    needs: lint-type
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ovi_test
          POSTGRES_USER: ovi_user
          POSTGRES_PASSWORD: ovi_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ovi_user -d ovi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ovi_user:ovi_password@localhost:5432/ovi_test
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: ci-anon-key
      SUPABASE_JWT_SECRET: ci-jwt-secret
      LEGACY_AUTH_ENABLED: "true"
      USDA_API_KEY: ci-usda
      SPOONACULAR_API_KEY: ci-spoonacular
      GEMINI_API_KEY: ci-gemini

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore
